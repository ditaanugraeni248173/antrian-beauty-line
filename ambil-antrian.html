<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css"
    />
    <style>
      :root {
        --primary: #e88ca0;
        --secondary: #f3cfd6;
        --hover-1: #97102d;
        --text: #ffffff;
      }
      body {
        margin: 0;
        font-family: "Poppins";
      }
      .container {
        display: flex;
        height: 100vh;
      }

      /* sidebar */
      .sidebar {
        display: flex;
        flex-direction: column;
        width: 250px;
        padding: 20px;
        background-color: var(--secondary);
        position: relative;
        gap: 15;
      }
      .logo {
        width: 150px;
        margin: 20px;
      }
      .sidebar-decor {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 70%;
      }
      .icon {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background-color: var(--primary);
        padding: 15px;
        margin: 15px;
        position: relative;
        color: var(--text);
        cursor: pointer;
        transition: 0.3s;
        border-radius: 10px;
      }
      a {
        text-decoration: none;
        color: var(--text);
      }

      /* main */
      .main {
        flex: 1;
        font-family: "poppins";
        background-image: url("img/Group91.png");
        background-repeat: repeat;
        background-size: 100vh;
      }
      /* form */
      .form {
        width: 80%;
        margin: 30px auto;
        padding: 20px;
        background-color: var(--primary);
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }
      .form h2 {
        text-align: center;
        margin-bottom: 25px;
        color: var(--text);
      }
      .form label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        font-size: 14px;
      }
      .form input,
      select {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-family: "Poppins";
        outline: none;
        transition: 0.3s;
      }
      .form input:focus,
      .form select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 5px rgba(232, 140, 160, 0.5);
      }
      .form button {
        width: 30%;
        padding: 12px;
        justify-content: center;
        background-color: var(--primary);
        border: none;
        border-radius: 10px;
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }
      /* footer */
      .footer {
        background-color: var(--primary);
        padding: 12px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        gap: 30px;
        position: static;
        bottom: 0;
        width: 100%;
      }
      .footer div {
        display: flex;
        align-items: center;
      }
      .copyright {
        font-size: 14px;
        color: var(--text);
      }
      /* hover effect */
      .icon:hover {
        background-color: var(--hover-1);
      }
      .form button:hover {
        background-color: var(--hover-1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- sidebar -->
      <div class="sidebar">
        <img src="img/vectorlogo.png" class="logo" />
        <img src="img/sidebar.png" class="sidebar-decor" />
        <div class="menu">
          <div class="icon">
            <i class="hgi hgi-stroke hgi-user"></i>
            <a href="index.html">Ambil Antrian</a>
          </div>
          <div class="icon">
            <i class="hgi hgi-stroke hgi-list-view"></i>
            <a href="kartu_antrian.html">Daftar Antrian</a>
          </div>
          <div class="icon">
            <i class="hgi hgi-stroke hgi-ticket-01"></i>
            <a href="daftar_antri.html">Kartu Antrian</a>
          </div>
        </div>
      </div>

      <!-- Main -->
      <div class="main">
        <!-- Form -->
        <div class="form">
          <h2>Ambil Antrian</h2>
          <form method="post">
            <label>Nomor Telepon</label>
            <input type="text" placeholder="Masukkan Nomor Telepon" />

            <label>Loket</label>
            <select name="loket" id="">
              <option>Pilih Loket</option>
              <option>Facial Treatment</option>
              <option>Laser Treatment</option>
              <option>Skin Booster</option>
            </select>

            <button type="submit">Ambil Antrian</button>
          </form>
        </div>
      </div>
    </div>
    <!-- footer -->
    <footer class="footer">
      <p class="copyright">&copy;Copyright 2026</p>
    </footer>
  </body>
</html>
