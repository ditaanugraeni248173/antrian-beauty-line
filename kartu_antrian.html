<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #f3edee;
        display: flex;
        height: 100vh;
        font-family: "poppins";
        background-image: url("Group 41.png");
        background-size: cover;
        background-position-x: 100px;
        background-position-y: 10px;
      }
      .container {
        display: flex;
        width: 100%;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        width: 250px;
        padding: 20px 20px;
        background-color: #f3cfd6;
        gap: 15px;
      }
      .logo {
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .logo span {
        font-family: "Times New Roman", Times, serif;
        font-weight: 600;
        color: #9f2941;
        font-size: 20px;
      }
      img {
        width: 150px;
        height: 150px;
      }
      .gmbar-kecil img {
        width: 200px;
        height: auto;
      }

      a {
        font-family: "poppins";
        text-decoration: none;
        text-align: center;
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 8px;
        background: #e88ca0;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }
      a:hover {
        background: #97102d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="logo">
          <img src="BEAUTY LINE logo.png" alt="logo" />
          <span>Beauty Line</span>
        </div>
        <a href="#" class="button"> Ambil Antrian </a>
        <a href="daftar_antri.html" class="button"> Daftar Antrian </a>
        <a href="#" class="button"> Kartu Antrian </a>
        <div class="gmbar-kecil">
          <img src="sidebar.png" alt="" />
        </div>
      </div>
    </div>
  </body>
</html>
