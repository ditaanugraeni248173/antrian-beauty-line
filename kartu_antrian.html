<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css"
    />
    <style>
      :root {
        --primary: #e88ca0;
        --secondary: #f3cfd6;
        --hover-1: #97102d;
        --text: #ffffff;
      }
      body {
        margin: 0;
        font-family: "Poppins";
      }
      .container {
        display: flex;
        height: 100vh;
      }

      /* sidebar */
      .sidebar {
        display: flex;
        flex-direction: column;
        width: 250px;
        padding: 20px;
        background-color: var(--secondary);
        position: relative;
        gap: 15;
      }
      .logo {
        width: 150px;
        margin: 20px;
      }
      .sidebar-decor {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 70%;
      }
      .icon {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background-color: var(--primary);
        padding: 15px;
        margin: 15px;
        position: relative;
        color: var(--text);
        cursor: pointer;
        transition: 0.3s;
        border-radius: 10px;
      }
      a {
        text-decoration: none;
        color: var(--text);
      }

      /* main */
      .main {
        flex: 1;
        font-family: "poppins";
        background-image: url("img/Group91.png");
        background-repeat: repeat;
        background-size: 100vh;
      }
    
      /* footer */
      .footer {
        background-color: var(--primary);
        padding: 12px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        gap: 30px;
        position: static;
        bottom: 0;
        width: 100%;
      }
      .footer div {
        display: flex;
        align-items: center;
      }
      .copyright {
        font-size: 14px;
        color: var(--text);
      }
      /* hover effect */
      .icon:hover {
        background-color: var(--hover-1);
      }
      .form button:hover {
        background-color: var(--hover-1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- sidebar -->
      <div class="sidebar">
        <img src="img/vectorlogo.png" class="logo" />
        <img src="img/sidebar.png" class="sidebar-decor" />
        <div class="menu">
          <div class="icon">
            <i class="hgi hgi-stroke hgi-user"></i>
            <a href="ambil-antrian.html">Ambil Antrian</a>
          </div>
          <div class="icon">
            <i class="hgi hgi-stroke hgi-list-view"></i>
            <a href="kartu_antrian.html">Daftar Antrian</a>
          </div>
          <div class="icon">
            <i class="hgi hgi-stroke hgi-ticket-01"></i>
            <a href="daftar_antri.html">Kartu Antrian</a>
          </div>
        </div>
      </div>

    <!-- footer -->
    <footer class="footer">
      <p class="copyright">&copy;Copyright 2026</p>
    </footer>
  </body>
</html>
